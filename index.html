<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Re:Cast</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="recast-app">
      <header class="header">
        <h1 class="header__logo">Re:Cast</h1>
        <button class="header__search-btn">🔍</button>
      </header>

      <main class="content">
        <section class="section section--hero">
          <h2 class="section__title">오늘의 공연</h2>
          <div class="hero-slider">
            <div class="hero-card">
              <div class="hero-card__image">포스터</div>
              <div class="hero-card__info">
                <span class="hero-card__tag">인기</span>
                <h3 class="hero-card__title">뮤지컬 &lt;레미제라블&gt;</h3>
              </div>
            </div>
          </div>
        </section>

        <section class="section">
          <h2 class="section__title">인기 캐스팅 해석</h2>
          <div class="scroll-container">
            <article class="interpretation-card">
              <div class="interpretation-card__thumb"></div>
              <div class="interpretation-card__details">
                <p class="interpretation-card__actor">배우 A 캐스팅</p>
                <p class="interpretation-card__keyword">#슬픔 #섬세한_감정선</p>
                <p class="interpretation-card__summary">
                  "이번 시즌 가장 완벽한 감정 해석..."
                </p>
              </div>
            </article>
            <article class="interpretation-card">
              <div class="interpretation-card__thumb"></div>
              <div class="interpretation-card__details">
                <p class="interpretation-card__actor">배우 B 캐스팅</p>
                <p class="interpretation-card__keyword">#에너지 #폭발적_성량</p>
                <p class="interpretation-card__summary">
                  "무대를 압도하는 카리스마가 일품..."
                </p>
              </div>
            </article>
          </div>
        </section>

        <section class="section">
          <h2 class="section__title">최근 관람 기록</h2>
          <div class="record-list">
            <div class="record-item">
              <div class="record-item__img"></div>
              <div class="record-item__info">
                <p class="record-item__name">지킬앤하이드</p>
                <p class="record-item__meta">26.03.05 | 조승우 캐스트</p>
              </div>
            </div>
          </div>
        </section>
      </main>

      <nav class="nav-bar">
        <div class="nav-bar__item nav-bar__item--active">🏠<br />Home</div>
        <div class="nav-bar__item">📖<br />Guide</div>
        <div class="nav-bar__item">🔴<br />Record</div>
        <div class="nav-bar__item">⚖️<br />Compare</div>
        <div class="nav-bar__item">👤<br />My</div>
      </nav>
    </div>
  </body>
</html>
